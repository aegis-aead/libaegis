name: version check

permissions:
  contents: read

on:
  push:
    tags:
      - '**'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Version check
        env:
          TAG_NAME: ${{ github.ref_name }}
        run: |
            grep -E 'const version =' build.zig | grep -E "\"${TAG_NAME}\"" || exit 78
            echo "Zig build version check passed."
            grep -E "project\(aegis.*VERSION ${TAG_NAME}.*\)" CMakeLists.txt || exit 78
            echo "CMake version check passed."
